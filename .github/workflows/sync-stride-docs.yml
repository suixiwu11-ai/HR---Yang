# 将 STRIDE mockups 同步到仓库根 docs/，供「main 分支 /docs」Pages 部署
name: Sync STRIDE docs for Pages

on:
  push:
    branches: [main, master]
    paths:
      - "项目/2026-05-黑客松项目/STRIDE/mockups/**"
      - ".github/workflows/sync-stride-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy mockups → docs/
        run: |
          rm -rf docs
          mkdir -p docs
          cp -r "项目/2026-05-黑客松项目/STRIDE/mockups/." docs/

      - name: Commit and push docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes in docs/"
            exit 0
          fi
          git commit -m "chore(pages): sync STRIDE mockups to docs/"
          git push
