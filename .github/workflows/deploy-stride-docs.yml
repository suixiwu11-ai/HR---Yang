# STRIDE 静态文档 · GitHub Pages（访客无需登录）
# 每次从 mockups 复制到 _site 再发布，避免 docs/ 未同步时部署旧内容
name: Deploy STRIDE HTML docs

on:
  push:
    branches: [main, master]
    paths:
      - "项目/2026-05-黑客松项目/STRIDE/mockups/**"
      - "docs/**"
      - ".github/workflows/deploy-stride-docs.yml"
      - ".github/workflows/sync-stride-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "stride-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site from mockups
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r "项目/2026-05-黑客松项目/STRIDE/mockups/." _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
