# STRIDE 静态文档 · GitHub Pages（访客无需登录）
name: Deploy STRIDE HTML docs

on:
  push:
    branches: [main, master]
    paths:
      - "项目/2026-05-黑客松项目/STRIDE/mockups/**"
      - ".github/workflows/deploy-stride-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "stride-pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 项目/2026-05-黑客松项目/STRIDE/mockups
      - id: deployment
        uses: actions/deploy-pages@v4
